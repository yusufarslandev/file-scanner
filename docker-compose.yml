services:
  backend:
    build: ./backend/FileScanner.Api
    container_name: file-scanner-backend
    environment:
      - Llm__Provider=openai
      - Llm__OpenAi__ApiKey=${LLM_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Production

  frontend:
    build: ./frontend
    container_name: file-scanner-frontend
    expose:
      - "80"
